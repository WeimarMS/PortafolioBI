<html lang="es">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Portafolio de Business Intelligence de Weimar Miranda, mostrando proyectos en Power BI, Looker Studio, Python y SQL.">
  <meta name="keywords" content="Business Intelligence, Data Analyst, Power BI, Looker Studio, Python, SQL, Weimar Miranda">
  <meta name="author" content="Weimar Miranda">
  <title>Weimar Miranda — Business Intelligence</title>

  <meta property="og:title" content="Portafolio de Weimar Miranda - Analista de Datos" />
  <meta property="og:description" content="Transformo datos en decisiones estratégicas con soluciones innovadoras. Experto en Power BI, Looker Studio, Python y SQL." />
  <meta property="og:image" content="https://placehold.co/1200x630/0A0A0A/E9C46A?text=Weimar+Miranda" />
  <meta property="og:url" content="https://weirrams.github.io/MyPortfolioB/" />
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0f0f0f;
      --bg-card: #181818;
      --bg-card-hover: #1f1f1f;
      --text: #e8e8e8;
      --text-muted: #888;
      --accent: #E9C46A;
      --accent-2: #2A9D8F;
      --border: rgba(255,255,255,0.08);
      --radius: 12px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; width: 100%; z-index: 1000;
      background: rgba(15,15,15,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      transition: background 0.3s;
    }
    .nav-container {
      display: flex; align-items: center; justify-content: space-between;
      max-width: 1200px; margin: 0 auto; padding: 0 32px; height: 64px;
    }
    .nav-logo {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 1.1rem; color: var(--text); text-decoration: none;
      letter-spacing: -0.02em;
    }
    .nav-logo span { color: var(--accent); }
    #nav-menu { display: flex; align-items: center; gap: 8px; }
    .nav-left, .nav-right { display: flex; list-style: none; gap: 4px; }
    nav ul li a {
      color: var(--text-muted); font-size: 0.875rem; font-weight: 400;
      text-decoration: none; padding: 6px 12px; border-radius: 6px;
      transition: color 0.2s, background 0.2s;
    }
    nav ul li a:hover { color: var(--text); background: rgba(255,255,255,0.06); }

    .lang-btn {
      background: transparent; border: 1px solid var(--border);
      color: var(--text-muted); padding: 5px 12px; border-radius: 20px;
      font-family: 'Inter', sans-serif; font-size: 0.8rem; cursor: pointer;
      transition: border-color 0.2s, color 0.2s; display: flex; align-items: center; gap: 6px;
    }
    .lang-btn img { width: 18px; height: 18px; object-fit: contain; border-radius: 2px; }
    .lang-btn:hover { border-color: var(--accent); color: var(--accent); }

    .hamburger {
      display: none; flex-direction: column; justify-content: space-between;
      width: 24px; height: 17px; cursor: pointer; background: none; border: none; padding: 0;
    }
    .hamburger span { background: var(--text); height: 2px; width: 100%; transition: all 0.3s ease; border-radius: 1px; }
    .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .hamburger.active span:nth-child(2) { opacity: 0; }
    .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(7px, -7px); }

    /* ── SECTIONS COMMON ── */
    .section-inner {
      max-width: 1100px; margin: 0 auto; padding: 120px 32px;
    }
    .section-label {
      font-size: 0.75rem; font-weight: 500; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 16px;
      display: block;
    }
    h2.section-title {
      font-family: 'Syne', sans-serif; font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 800; line-height: 1.1; color: var(--text);
      letter-spacing: -0.03em; margin-bottom: 64px;
    }

    /* ── HERO ── */
    #home {
      min-height: 100vh; display: flex; align-items: center;
      padding-top: 64px; position: relative; overflow: hidden;
    }
    #home::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 60% 40%, rgba(42,157,143,0.08) 0%, transparent 60%),
                  radial-gradient(ellipse 50% 50% at 20% 80%, rgba(233,196,106,0.06) 0%, transparent 60%);
      pointer-events: none;
    }
    .hero-inner {
      max-width: 1100px; margin: 0 auto; padding: 0 32px;
      display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 80px;
    }
    .hero-eyebrow {
      display: flex; align-items: center; gap: 12px; margin-bottom: 32px;
    }
    .hero-eyebrow-line {
      width: 40px; height: 1px; background: var(--accent);
    }
    .hero-eyebrow-text {
      font-size: 0.8rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--accent); font-weight: 500;
    }
    .hero-name {
      font-family: 'Syne', sans-serif;
      font-size: clamp(3.5rem, 8vw, 6.5rem);
      font-weight: 800; line-height: 0.95;
      letter-spacing: -0.04em; color: var(--text);
      margin-bottom: 8px;
    }
    .hero-name-logo {
      display: inline-block; height: 0.8em; width: auto;
      vertical-align: middle; margin: 0 8px; opacity: 0.9;
      filter: brightness(0) invert(1);
    }
    .hero-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 700; line-height: 1;
      letter-spacing: -0.03em;
      color: var(--accent); margin-bottom: 32px;
    }
    .hero-desc {
      font-size: 1.05rem; color: var(--text-muted);
      max-width: 480px; margin-bottom: 48px; line-height: 1.8;
    }
    .hero-ctas { display: flex; gap: 16px; flex-wrap: wrap; }
    .btn-primary {
      display: inline-block; padding: 14px 32px;
      background: var(--accent); color: #0f0f0f;
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.9rem; text-decoration: none; border-radius: 6px;
      transition: transform 0.2s, box-shadow 0.2s;
      letter-spacing: 0.02em;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(233,196,106,0.25); }
    .btn-ghost {
      display: inline-block; padding: 13px 32px;
      background: transparent; color: var(--text);
      font-family: 'Syne', sans-serif; font-weight: 600;
      font-size: 0.9rem; text-decoration: none; border-radius: 6px;
      border: 1px solid var(--border); transition: border-color 0.2s, transform 0.2s;
    }
    .btn-ghost:hover { border-color: rgba(255,255,255,0.25); transform: translateY(-2px); }

    .hero-avatar {
      width: 220px; height: 220px; border-radius: 50%;
      object-fit: cover; border: 2px solid var(--border);
      filter: grayscale(20%);
    }

    /* ── DIVIDER ── */
    .section-divider {
      border: none; height: 1px;
      background: var(--border);
      max-width: 1100px; margin: 0 auto;
    }

    /* ── ABOUT ── */
    #about { background: var(--bg); }
    .about-grid {
      display: grid; grid-template-columns: 1fr 1.5fr; gap: 80px; align-items: start;
    }
    .about-stat-block { margin-top: 40px; }
    .about-stat {
      margin-bottom: 32px;
    }
    .about-stat-number {
      font-family: 'Syne', sans-serif; font-size: 3rem; font-weight: 800;
      color: var(--accent); line-height: 1; letter-spacing: -0.04em;
    }
    .about-stat-label {
      font-size: 0.85rem; color: var(--text-muted); margin-top: 4px;
    }
    .about-text-body {
      font-size: 1rem; color: var(--text-muted); line-height: 1.9;
    }

    /* ── SKILLS ── */
    #skills { background: var(--bg); }
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
    }
    .skill-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 20px;
      display: flex; flex-direction: column; align-items: center;
      gap: 16px; text-align: center;
      transition: border-color 0.25s, transform 0.25s, background 0.25s;
    }
    .skill-item:hover {
      border-color: var(--accent);
      background: var(--bg-card-hover);
      transform: translateY(-4px);
    }
    .skill-item img {
      height: 52px; width: auto; object-fit: contain;
      filter: grayscale(30%); transition: filter 0.25s;
    }
    .skill-item:hover img { filter: grayscale(0%); }
    .skill-item span {
      font-family: 'Syne', sans-serif; font-size: 0.85rem;
      font-weight: 600; color: var(--text-muted);
      transition: color 0.25s; letter-spacing: 0.02em;
    }
    .skill-item:hover span { color: var(--text); }

    /* ── PROJECTS ── */
    #projects { background: var(--bg); }
    .project-view-note {
      font-size: 0.8rem; color: var(--text-muted);
      margin-top: -40px; margin-bottom: 48px; font-style: italic;
    }
    .projects-grid { display: grid; gap: 24px; }
    .project-card {
      display: grid; grid-template-columns: 1.1fr 1fr;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      transition: border-color 0.25s, transform 0.25s;
    }
    .project-card:hover { border-color: rgba(233,196,106,0.3); transform: translateY(-3px); }
    .project-link {
      display: block; overflow: hidden; aspect-ratio: 16/10;
    }
    .project-gif {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.5s ease;
    }
    .project-card:hover .project-gif { transform: scale(1.04); }
    .project-content {
      padding: 40px 36px; display: flex; flex-direction: column; justify-content: center;
    }
    .project-tools { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .tool-badge {
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; padding: 4px 10px; border-radius: 4px;
      background: rgba(42,157,143,0.15); color: var(--accent-2);
      border: 1px solid rgba(42,157,143,0.2);
    }
    .project-content h3 {
      font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 700;
      color: var(--text); line-height: 1.25; margin-bottom: 16px;
      letter-spacing: -0.02em;
    }
    .project-content p {
      font-size: 0.9rem; color: var(--text-muted); line-height: 1.8;
    }
    .project-cta {
      margin-top: 24px; display: inline-flex; align-items: center; gap: 8px;
      font-size: 0.8rem; color: var(--accent); font-weight: 500;
      text-decoration: none; letter-spacing: 0.02em;
    }
    .project-cta::after { content: '→'; transition: transform 0.2s; }
    .project-card:hover .project-cta::after { transform: translateX(4px); }

    /* ── TESTIMONIALS ── */
    #testimonials { background: var(--bg); }
    .testimonials-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px;
    }
    .testimonial-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 36px;
      transition: border-color 0.25s;
    }
    .testimonial-card:hover { border-color: rgba(233,196,106,0.3); }
    .stars { color: var(--accent); font-size: 0.9rem; margin-bottom: 20px; display: block; }
    .testimonial-card blockquote {
      font-size: 1rem; line-height: 1.8; color: var(--text-muted);
      font-style: italic; margin-bottom: 24px;
    }
    .testimonial-author-container {
      display: flex; align-items: center; justify-content: space-between;
    }
    .author {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.95rem; color: var(--text);
    }
    .platform-logo {
      height: 28px; width: auto; object-fit: contain;
      opacity: 0.6; filter: brightness(0) invert(1);
    }

    /* ── EXPERIENCE ── */
    #experience { background: var(--bg); }

    #toggle-experience-footer {
      display: inline-flex; align-items: center; gap: 10px;
      margin: 0 auto; padding: 10px 24px; border-radius: 6px;
      cursor: pointer; font-family: 'Syne', sans-serif;
      font-size: 0.85rem; font-weight: 600;
      color: var(--text-muted); border: 1px solid var(--border);
      background: transparent; transition: border-color 0.2s, color 0.2s;
      display: flex;
    }
    #toggle-experience-footer:hover { border-color: var(--accent); color: var(--accent); }
    #toggle-experience-footer .arrow-icon { transition: transform 0.3s ease; font-size: 0.75rem; }
    #toggle-experience-footer.expanded .arrow-icon { transform: rotate(180deg); }

    .exp-toggle-wrapper { text-align: center; margin-top: 48px; }

    .timeline-container {
      position: relative; max-width: 760px; margin: 0 auto;
      max-height: 0; overflow: hidden; opacity: 0;
      transition: max-height 0.8s ease-in-out, opacity 0.5s ease-in-out;
    }
    .timeline-container.expanded { max-height: 10000px; opacity: 1; }

    /* vertical line */
    .timeline-container::after {
      content: ''; position: absolute;
      width: 1px; background: var(--border);
      top: 0; bottom: 0; left: 50%; transform: translateX(-50%);
    }

    .timeline-item {
      padding: 10px 48px; position: relative;
      background: transparent; width: 50%; margin-bottom: 40px;
    }
    /* dot */
    .timeline-item::after {
      content: ''; position: absolute;
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent); border: 2px solid var(--bg);
      top: 24px; right: -5px; z-index: 1;
      box-shadow: 0 0 0 3px rgba(233,196,106,0.2);
    }
    .timeline-item.left { left: 0; }
    .timeline-item.right { left: 50%; }
    .timeline-item.right::after { left: -5px; right: auto; }

    .timeline-content {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px 28px;
      transition: border-color 0.25s;
    }
    .timeline-content:hover { border-color: rgba(233,196,106,0.25); }
    .timeline-content h3 {
      font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
      color: var(--text); margin-bottom: 4px; line-height: 1.3;
    }
    .timeline-content .company {
      font-size: 0.8rem; color: var(--accent-2); font-weight: 500; margin-bottom: 4px;
    }
    .timeline-date {
      font-size: 0.75rem; color: var(--text-muted);
      display: block; margin-bottom: 12px; letter-spacing: 0.03em;
    }
    .responsibilities-list {
      list-style: none; padding: 0; margin-top: 8px;
      max-height: 0; overflow: hidden; opacity: 0;
      transition: max-height 0.5s ease-out, opacity 0.4s ease-out;
    }
    .responsibilities-list.expanded { max-height: 500px; opacity: 1; }
    .responsibilities-list li {
      font-size: 0.85rem; color: var(--text-muted);
      padding-left: 16px; position: relative; margin-bottom: 6px; line-height: 1.7;
    }
    .responsibilities-list li::before {
      content: ''; position: absolute; left: 0; top: 10px;
      width: 5px; height: 1px; background: var(--accent);
    }
    .toggle-details-btn {
      margin-top: 12px; background: transparent;
      color: var(--text-muted); border: 1px solid var(--border);
      padding: 5px 14px; border-radius: 4px; cursor: pointer;
      font-size: 0.75rem; font-family: 'Inter', sans-serif;
      transition: border-color 0.2s, color 0.2s; font-weight: 500;
    }
    .toggle-details-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── CONTACT ── */
    #contact { background: var(--bg); }
    .contact-grid {
      display: grid; grid-template-columns: 1fr 1.2fr; gap: 80px; align-items: start;
    }
    .contact-info h3 {
      font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 700;
      color: var(--text); margin-bottom: 16px; letter-spacing: -0.02em;
    }
    .contact-info p { font-size: 0.95rem; color: var(--text-muted); line-height: 1.8; margin-bottom: 32px; }
    .social-links { display: flex; flex-direction: column; gap: 16px; }
    .social-icon {
      display: inline-flex; align-items: center; gap: 14px;
      text-decoration: none; color: var(--text-muted);
      font-size: 0.9rem; transition: color 0.2s;
    }
    .social-icon img {
      width: 32px; height: 32px; object-fit: contain;
      filter: brightness(0) invert(0.6);
      transition: filter 0.2s;
    }
    .social-icon:hover { color: var(--text); }
    .social-icon:hover img { filter: brightness(0) invert(1); }

    .contact-form-wrapper {}
    .contact-form-wrapper form {
      display: flex; flex-direction: column; gap: 16px;
    }
    .contact-form-wrapper input,
    .contact-form-wrapper textarea {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px 18px;
      font-size: 0.9rem; font-family: 'Inter', sans-serif;
      color: var(--text); transition: border-color 0.2s; outline: none;
    }
    .contact-form-wrapper input::placeholder,
    .contact-form-wrapper textarea::placeholder { color: var(--text-muted); }
    .contact-form-wrapper input:focus,
    .contact-form-wrapper textarea:focus { border-color: var(--accent); }
    .contact-form-wrapper button {
      padding: 14px; background: var(--accent); color: #0f0f0f;
      border: none; border-radius: 8px; cursor: pointer;
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.9rem; transition: transform 0.2s, box-shadow 0.2s;
      letter-spacing: 0.02em;
    }
    .contact-form-wrapper button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(233,196,106,0.2);
    }
    #form-message {
      color: var(--accent-2); font-size: 0.9rem;
      text-align: center; margin-top: 8px;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 40px 32px; text-align: center;
    }
    footer p {
      font-size: 0.8rem; color: var(--text-muted);
    }

    /* ── SCROLL REVEAL ── */
    .reveal {
      opacity: 0; transform: translateY(24px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    .reveal-delay-3 { transition-delay: 0.3s; }
    .reveal-delay-4 { transition-delay: 0.4s; }

    /* ── HERO ENTRANCE ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hero-eyebrow  { animation: fadeUp 0.7s ease both; animation-delay: 0.1s; }
    .hero-name     { animation: fadeUp 0.7s ease both; animation-delay: 0.25s; }
    .hero-title    { animation: fadeUp 0.7s ease both; animation-delay: 0.4s; }
    .hero-desc     { animation: fadeUp 0.7s ease both; animation-delay: 0.55s; }
    .hero-ctas     { animation: fadeUp 0.7s ease both; animation-delay: 0.7s; }
    .hero-avatar   { animation: fadeUp 0.7s ease both; animation-delay: 0.3s; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .hero-inner { grid-template-columns: 1fr; gap: 48px; }
      .hero-avatar { width: 140px; height: 140px; order: -1; }
      .about-grid { grid-template-columns: 1fr; gap: 40px; }
      .skills-grid { grid-template-columns: repeat(3, 1fr); }
      .project-card { grid-template-columns: 1fr; }
      .project-link { aspect-ratio: 16/9; }
      .contact-grid { grid-template-columns: 1fr; gap: 48px; }
      .timeline-container::after { left: 24px; }
      .timeline-item { width: 100%; padding-left: 56px; padding-right: 16px; }
      .timeline-item.right { left: 0; }
      .timeline-item::after, .timeline-item.right::after { left: 19px; right: auto; }
      .section-inner { padding: 80px 24px; }
    }
    @media (max-width: 600px) {
      .skills-grid { grid-template-columns: repeat(2, 1fr); }
      .hero-name { font-size: 3rem; }
      .hero-title { font-size: 2rem; }
      .hamburger { display: flex; z-index: 1001; }
      #nav-menu {
        flex-direction: column; position: absolute; top: 64px; left: 0;
        width: 100%; background: rgba(15,15,15,0.98);
        backdrop-filter: blur(16px); padding: 16px 0;
        border-bottom: 1px solid var(--border);
        transform: translateY(-110%); transition: transform 0.3s ease;
        gap: 0;
      }
      #nav-menu.active { transform: translateY(0); }
      .nav-left, .nav-right { flex-direction: column; align-items: center; width: 100%; gap: 0; }
      .nav-left li, .nav-right li { width: 100%; text-align: center; }
      nav ul li a { display: block; padding: 12px; }
    }
  </style>
</head>
<body>

  <!-- ── NAV ── -->

    let currentLang = localStorage.getItem('lang') || 'es';
    const langButton = document.querySelector('.lang-btn');

    const applyTranslations = () => {
      document.documentElement.lang = currentLang;
      document.querySelectorAll('[data-translate]').forEach(el => {
        const key = el.getAttribute('data-translate');
        const val = translations[currentLang]?.[key];
        if (val !== undefined) el.textContent = val;
      });
      const langImg  = langButton.querySelector('img');
      const langText = langButton.querySelector('span');
      const form     = document.getElementById('contact-form');
      if (currentLang === 'en') {
        langImg.src = 'assets/images/ESPANA.png'; langImg.alt = 'Bandera de España';
        langText.textContent = 'Español';
        form.querySelector('[name="name"]').placeholder    = 'Name';
        form.querySelector('[name="email"]').placeholder   = 'Email';
        form.querySelector('[name="message"]').placeholder = 'Message';
      } else {
        langImg.src = 'assets/images/USAFLAG.png'; langImg.alt = 'US Flag';
        langText.textContent = 'English';
        form.querySelector('[name="name"]').placeholder    = 'Nombre';
        form.querySelector('[name="email"]').placeholder   = 'Correo Electrónico';
        form.querySelector('[name="message"]').placeholder = 'Mensaje';
      }
    };

    langButton.addEventListener('click', () => {
      currentLang = currentLang === 'en' ? 'es' : 'en';
      localStorage.setItem('lang', currentLang);
      applyTranslations();
    });

    /* ── EXPERIENCE TOGGLE ── */
    const toggleFooter     = document.getElementById('toggle-experience-footer');
    const timelineContainer = document.querySelector('.timeline-container');
    const detailButtons    = document.querySelectorAll('.toggle-details-btn');

    toggleFooter.addEventListener('click', () => {
      const expanded = timelineContainer.classList.toggle('expanded');
      toggleFooter.classList.toggle('expanded', expanded);
      const textSpan  = toggleFooter.querySelector('span:first-of-type');
      const arrowIcon = toggleFooter.querySelector('.arrow-icon');
      if (expanded) {
        textSpan.textContent = translations[currentLang]['experience.toggleAll'];
        arrowIcon.innerHTML  = '▲';
      } else {
        textSpan.textContent = translations[currentLang]['experience.toggleAll.expand'];
        arrowIcon.innerHTML  = '▼';
        document.querySelectorAll('.responsibilities-list.expanded').forEach(list => {
          list.classList.remove('expanded');
          const btn = list.nextElementSibling;
          if (btn) btn.textContent = translations[currentLang]['experience.toggle'];
        });
      }
    });

    detailButtons.forEach(btn => {
      btn.addEventListener('click', function () {
        const list     = this.previousElementSibling;
        const expanded = list.classList.toggle('expanded');
        this.textContent = expanded
          ? translations[currentLang]['experience.toggle.hide']
          : translations[currentLang]['experience.toggle'];
      });
    });

    /* ── CONTACT FORM ── */
    const form        = document.getElementById('contact-form');
    const iframe      = document.getElementById('hidden_iframe');
    const formMessage = document.getElementById('form-message');
    let isSubmitting  = false;

    form.addEventListener('submit', () => { isSubmitting = true; });
    iframe.addEventListener('load', () => {
      if (!isSubmitting) return;
      formMessage.style.display = 'block';
      formMessage.textContent   = currentLang === 'en' ? 'Message sent! Thank you.' : '¡Mensaje enviado! Gracias.';
      form.reset();
      isSubmitting = false;
      setTimeout(() => { formMessage.style.display = 'none'; }, 3000);
    });

    applyTranslations();
  });
  </script>
